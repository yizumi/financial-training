name: Build and Release HTML

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build the book (all chapters → one HTML)
        run: |
          set -euo pipefail
          npm run build:book
          ls -la dist/

      - name: Compute release metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=release-${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "name=Release #${GITHUB_RUN_NUMBER} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            Single-file HTML book rendered from `${{ github.sha }}`.

            Open `book.html` in a browser to read; all chapters are in one document with page breaks between them for printing.
          files: |
            dist/book.html
          generate_release_notes: true
